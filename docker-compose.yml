services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research_pw}
      POSTGRES_DB: ${POSTGRES_DB:-research_agent}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-research} -d ${POSTGRES_DB:-research_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: research_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: research_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://research:research_pw@postgres:5432/research_agent
      DATABASE_URL_SYNC: postgresql+psycopg2://research:research_pw@postgres:5432/research_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIM: "768"
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me_in_production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "10080"
      APP_ENV: production
      LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost,http://localhost:80
    extra_hosts:
      # Linux: route host.docker.internal to the host gateway
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
    container_name: research_worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://research:research_pw@postgres:5432/research_agent
      DATABASE_URL_SYNC: postgresql+psycopg2://research:research_pw@postgres:5432/research_agent
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIM: "768"
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me_in_production}
      APP_ENV: production
      LOG_LEVEL: INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: research_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: research_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
